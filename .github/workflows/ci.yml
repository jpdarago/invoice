name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.20"

      # v7 installs golangci-lint v2, which understands the version: "2"
      # config format in .golangci.yml. (v6 installs v1 and rejects it.)
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - run: go build ./...

      - run: go test ./...
